# Deploy Rust doc-parser ke Fly.io (build image di infrastruktur Fly).
#
# Setup sekali di GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: FLY_API_TOKEN
#   Value: token dari `fly tokens create deploy` (jalankan lokal setelah fly auth login)
#        atau deploy token dari Fly dashboard.
#
# App Fly harus sudah ada dan sama dengan `app` di services/doc-parser/fly.toml.
# Buat sekali: cd services/doc-parser && fly apps create <nama-app> --save -y

name: Deploy doc-parser to Fly.io

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'services/doc-parser/**'
      - '.github/workflows/deploy-doc-parser.yml'

concurrency:
  group: fly-deploy-doc-parser-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/doc-parser

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --ha=false --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
